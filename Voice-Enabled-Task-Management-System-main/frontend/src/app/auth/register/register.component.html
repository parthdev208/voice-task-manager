<div class="auth-page">
  <div class="auth-card">
    <div class="auth-left">
      <div class="brand"><span class="dot"></span> VoiceTask</div>

      <h1>Get started</h1>
      <p class="sub">Create your free account</p>

      <div *ngIf="error" class="error-banner">{{ error }}</div>

      <form [formGroup]="form" (ngSubmit)="onSubmit()">
        <div class="form-row">
          <div class="form-group">
            <label>First name</label>
            <input formControlName="firstName" placeholder="Saksham" />
          </div>
          <div class="form-group">
            <label>Last name</label>
            <input formControlName="lastName" placeholder="Sethi" />
          </div>
        </div>

        <div class="form-group">
          <label>Email</label>
          <input formControlName="email" type="email" placeholder="you@example.com" />
        </div>

        <div class="form-group">
          <label>Password</label>
          <div class="input-wrap">
            <input formControlName="password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Min. 8 characters" />
            <span class="toggle-eye" (click)="showPassword = !showPassword">
              {{ showPassword ? '🙈' : '👁' }}
            </span>
          </div>
        </div>

        <button type="submit" class="btn-primary" [disabled]="loading">
          {{ loading ? 'Creating...' : 'Create account' }}
        </button>
      </form>

      <p class="switch-link">
        Already have an account? <a routerLink="/login">Sign in</a>
      </p>
    </div>

    <div class="auth-right">
      <h2>Manage tasks<br>with your voice</h2>
      <p>The smarter way to stay organized.</p>
    </div>
  </div>
</div>
